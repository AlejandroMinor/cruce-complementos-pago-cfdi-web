<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cruce Complementos Pago CFDI</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 { font-size: 1.2rem; }
        .zona {
            background: white;
            border: 1px solid #ddd;
            padding: 16px;
            margin: 12px 0;
            border-radius: 4px;
        }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type="file"] { width: 100%; }
        button {
            margin-top: 16px;
            padding: 8px 20px;
            cursor: pointer;
            font-family: monospace;
        }
        #resultado { margin-top: 20px; }
        .match {
            background: white;
            border-left: 4px solid;
            padding: 10px 14px;
            margin: 8px 0;
            border-radius: 4px;
        }
        .match p { margin: 2px 0; }
        .ok    { border-color: green; color: green; }
        .error { border-color: red;   color: red; }
    </style>
</head>
<body>
    <h1>Cruce Complementos Pago CFDI</h1>

    <div class="zona">
        <label>Facturas (XMLs tipo I):</label>
        <input type="file" id="facturas" accept=".xml" multiple>
    </div>

    <div class="zona">
        <label>Complementos de pago (XMLs tipo P):</label>
        <input type="file" id="complementos" accept=".xml" multiple>
    </div>

    <button onclick="cruzar()">Cruzar</button>

    <div id="resultado"></div>

    <script src="cfdi.js"></script>
</body>
</html>
