<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruce Complementos Pago CFDI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        tr.row-ok   { background: rgba(45, 158, 95, 0.08); }
        tr.row-error { background: rgba(192, 57, 43, 0.08); }
        td.estado-ok    { color: #2d9e5f; font-weight: bold; }
        td.estado-error { color: #c0392b; font-weight: bold; }
        td.uuid { font-size: 0.78rem; opacity: 0.7; word-break: break-all; min-width: 9rem; }
        td.sin-match { opacity: 0.5; font-style: italic; }

        #col-toggles { margin-bottom: 1rem; }
        #col-toggles div { display: flex; flex-wrap: wrap; gap: 0.4rem 1.4rem; margin-top: 0.6rem; }
        #col-toggles label { font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.3rem; cursor: pointer; }

        .hide-col-1 th:nth-child(1), .hide-col-1 td:nth-child(1) { display: none; }
        .hide-col-2 th:nth-child(2), .hide-col-2 td:nth-child(2) { display: none; }
        .hide-col-3 th:nth-child(3), .hide-col-3 td:nth-child(3) { display: none; }
        .hide-col-4 th:nth-child(4), .hide-col-4 td:nth-child(4) { display: none; }
        .hide-col-5 th:nth-child(5), .hide-col-5 td:nth-child(5) { display: none; }
        .hide-col-6 th:nth-child(6), .hide-col-6 td:nth-child(6) { display: none; }
        .hide-col-7 th:nth-child(7), .hide-col-7 td:nth-child(7) { display: none; }
        .hide-col-8 th:nth-child(8), .hide-col-8 td:nth-child(8) { display: none; }
    </style>
</head>
<body>
    <main class="container">
        <h1>Cruce Complementos Pago CFDI</h1>

        <article>
            <label for="facturas"><strong>Facturas</strong> (XMLs tipo I)</label>
            <input type="file" id="facturas" accept=".xml" multiple>
        </article>

        <article>
            <label for="complementos"><strong>Complementos de pago</strong> (XMLs tipo P)</label>
            <input type="file" id="complementos" accept=".xml" multiple>
        </article>

        <button onclick="cruzar()">Cruzar</button>

        <div id="resultado" style="margin-top: 1.5rem;"></div>
    </main>

    <script src="cfdi.js"></script>
</body>
</html>
