<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cruce Complementos Pago CFDI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="topbar">
  <div class="brand">
    <div class="brand-logo">I⇄P</div>
    <div class="brand-text">
      <div class="brand-title-row">
        <span class="brand-title">Cruce Complementos de Pago</span>
        <span class="badge-version">CFDI 4.0</span>
      </div>
      <span class="brand-sub">Verifica qué facturas ya cuentan con su complemento de pago</span>
    </div>
  </div>
  <div class="privacy">
    <span class="dot"></span>
    <span>Procesamiento 100% local — tus XML nunca se suben a ningún servidor</span>
  </div>
</header>

<main class="container">

  <div class="upload-grid">
    <div class="upload-card">
      <div class="upload-head">
        <span class="upload-label">Facturas</span>
        <span class="upload-count" id="facturas-count">0 archivos</span>
      </div>
      <label class="dropzone" for="facturas">
        <span class="dz-icon">⤓</span>
        <span class="dz-title">Arrastra tus XML aquí</span>
        <span class="dz-sub">XMLs tipo I (Ingreso) — o haz clic para seleccionar</span>
      </label>
      <input id="facturas" type="file" accept=".xml,text/xml" multiple hidden>
    </div>

    <div class="upload-card">
      <div class="upload-head">
        <span class="upload-label">Complementos de pago</span>
        <span class="upload-count" id="complementos-count">0 archivos</span>
      </div>
      <label class="dropzone" for="complementos">
        <span class="dz-icon">⤓</span>
        <span class="dz-title">Arrastra tus XML aquí</span>
        <span class="dz-sub">XMLs tipo P (Pago) — o haz clic para seleccionar</span>
      </label>
      <input id="complementos" type="file" accept=".xml,text/xml" multiple hidden>
    </div>
  </div>

  <button class="btn-cruzar" onclick="cruzar()">Cruzar archivos</button>

  <div id="resultado"></div>

</main>
